<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Disaster & Weather Map</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --glass: rgba(10, 12, 18, 0.72);
            --glass-border: rgba(255,255,255,0.08);
            --accent: #ff4d4d;
            --accent2: #ff9f43;
            --text: #f0f2f5;
            --muted: rgba(240,242,245,0.45);
            --radius: 18px;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0c12;
            font-family: 'DM Mono', monospace;
        }

        #map {
            width: 100vw;
            height: 100vh;  /* Fallback for older browsers */
            height: 100dvh;
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── Weather Card ── */
        .weather-card {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 16px 20px;
            min-width: 190px;
            color: var(--text);
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity .4s ease, transform .4s ease;
            pointer-events: none; /* Ignore clicks when hidden */
        }
        .weather-card.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .weather-card .label {
            font-size: 10px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .weather-card .temp {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            font-weight: 700;
            line-height: 1;
            color: var(--text);
        }

        .weather-card .temp sup {
            font-size: 18px;
            font-weight: 600;
            vertical-align: super;
        }

        .weather-card .meta {
            display: flex;
            gap: 14px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .weather-card .pill {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--muted);
            background: rgba(255,255,255,0.06);
            border-radius: 100px;
            padding: 4px 10px;
        }

        .weather-card .pill svg { flex-shrink: 0; }

        /* ── Stats Bar (bottom) ── */
        .stats-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 10px 22px;
            display: flex;
            align-items: center;
            gap: 20px;
            color: var(--text);
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity .4s ease;
            pointer-events: none;
        }
        .stats-bar.visible { opacity: 1; pointer-events: auto; }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .stat-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            flex-shrink: 0;
        }
        .stat-dot.amber { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

        .divider {
            width: 1px; height: 18px;
            background: var(--glass-border);
        }

        .stat-count {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
        }

        /* ── Live Location Ping ── */
        .live-marker { position: relative; width: 20px; height: 20px; }
        .live-marker .dot {
            width: 14px; height: 14px;
            background: #4ade80;
            border-radius: 50%;
            border: 2.5px solid #fff;
            position: absolute;
            top: 3px; left: 3px;
            box-shadow: 0 0 0 0 rgba(74,222,128,0.5);
            animation: ping 1.8s ease-out infinite;
        }
        .live-marker .ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(74,222,128,0.6);
            animation: ring-expand 1.8s ease-out infinite;
        }

        @keyframes ping {
            0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); }
            70%  { box-shadow: 0 0 0 12px rgba(74,222,128,0); }
            100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
        }
        @keyframes ring-expand {
            0%   { transform: scale(1); opacity: .7; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        /* ── Disaster pulse icons ── */
        .disaster-pulse { width: 16px; height: 16px; position: relative; }
        .disaster-pulse .core {
            width: 10px; height: 10px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            position: absolute;
            top: 3px; left: 3px;
            animation: disaster-ping 2.2s ease-out infinite;
        }
        @keyframes disaster-ping {
            0%, 60% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
            100%   { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
        }

        /* ── Leaflet popups & controls ── */
        .leaflet-popup-content-wrapper {
            background: rgba(10,12,18,0.92) !important;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 14px !important;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4) !important;
            color: var(--text) !important;
            font-family: 'DM Mono', monospace !important;
            padding: 2px !important;
        }
        .leaflet-popup-tip { background: rgba(10,12,18,0.92) !important; }
        .leaflet-popup-content { margin: 14px 16px !important; }
        .popup-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .popup-cat {
            font-size: 10px;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .popup-link {
            display: inline-block;
            font-size: 10px;
            color: #60a5fa;
            text-decoration: none;
            border-bottom: 1px solid rgba(96,165,250,0.3);
            padding-bottom: 1px;
        }
        .leaflet-control-zoom {
            border: none !important;
            border-radius: 14px !important;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
        }
        .leaflet-control-zoom a {
            background: rgba(10,12,18,0.85) !important;
            backdrop-filter: blur(10px);
            color: var(--text) !important;
            border: none !important;
            border-bottom: 1px solid rgba(255,255,255,0.06) !important;
            font-size: 16px !important;
            line-height: 28px !important;
            width: 30px !important;
            height: 30px !important;
        }
        .leaflet-control-zoom a:hover { background: rgba(30,35,50,0.9) !important; }

        /* ── Mobile tweaks ── */
        @media (max-width: 480px) {
            .weather-card { top: 14px; left: 14px; padding: 12px 16px; min-width: 160px; }
            .weather-card .temp { font-size: 34px; }
            .stats-bar { bottom: 16px; padding: 8px 16px; gap: 12px; font-size: 11px; }
            .stat-count { font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="weather-card" id="weather-card">
    <div class="label">Your Location</div>
    <div class="temp" id="temp-display">--<sup>°C</sup></div>
    <div class="meta">
        <div class="pill">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7z"/></svg>
            <span id="wind-display">-- km/h</span>
        </div>
        <div class="pill">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <span id="code-display">--</span>
        </div>
    </div>
</div>

<div class="stats-bar" id="stats-bar">
    <div class="stat-item">
        <div class="stat-dot"></div>
        <span>Active events</span>
        <span class="stat-count" id="event-count">--</span>
    </div>
    <div class="divider"></div>
    <div class="stat-item">
        <div class="stat-dot amber"></div>
        <span>NASA EONET</span>
    </div>
    <div class="divider"></div>
    <div class="stat-item" style="color:var(--muted); font-size:10px;" id="update-time">--</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Map Initialization
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd', maxZoom: 20
    }).addTo(map);

    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.control.attribution({ position: 'bottomleft', prefix: '' })
        .addAttribution('<span style="font-size:9px;color:rgba(255,255,255,.3)">© OpenStreetMap · CARTO · NASA EONET</span>')
        .addTo(map);

    // Cache DOM Elements for performance
    const DOM = {
        tempDisplay: document.getElementById('temp-display'),
        windDisplay: document.getElementById('wind-display'),
        codeDisplay: document.getElementById('code-display'),
        weatherCard: document.getElementById('weather-card'),
        eventCount: document.getElementById('event-count'),
        updateTime: document.getElementById('update-time'),
        statsBar: document.getElementById('stats-bar')
    };

    const weatherCodes = {
        0:'Clear', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
        45:'Foggy', 48:'Icy fog', 51:'Light drizzle', 61:'Light rain',
        63:'Moderate rain', 65:'Heavy rain', 71:'Light snow', 80:'Rain showers',
        95:'Thunderstorm', 99:'Hail storm'
    };

    const getWeatherLabel = (code) => weatherCodes[code] || `Code ${code}`;

    // Custom Map Icons
    const liveIcon = L.divIcon({
        className: '',
        html: `<div class="live-marker"><div class="dot"></div><div class="ring"></div></div>`,
        iconSize: [20, 20], iconAnchor: [10, 10]
    });

    const disasterIcon = L.divIcon({
        className: '',
        html: `<div class="disaster-pulse"><div class="core"></div></div>`,
        iconSize: [16, 16], iconAnchor: [8, 8]
    });

    // API Functions
    async function fetchWeather(lat, lon) {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const { current_weather: cw } = await res.json();
            
            DOM.tempDisplay.innerHTML = `${Math.round(cw.temperature)}<sup>°C</sup>`;
            DOM.windDisplay.textContent = `${cw.windspeed} km/h`;
            DOM.codeDisplay.textContent = getWeatherLabel(cw.weathercode);
            DOM.weatherCard.classList.add('visible');
        } catch(e) { 
            console.error('Weather error:', e); 
        }
    }

    async function fetchDisasters() {
        try {
            const res = await fetch('https://eonet.gsfc.nasa.gov/api/v3/events?status=open');
            const data = await res.json();
            let count = 0;

            // Process data in a document fragment-like manner for the map
            data.events.forEach(evt => {
                const geo = evt.geometry[0];
                if (geo.type !== 'Point') return;
                const [lon, lat] = geo.coordinates;
                count++;

                L.marker([lat, lon], { icon: disasterIcon })
                    .addTo(map)
                    .bindPopup(`
                        <div class="popup-title">${evt.title}</div>
                        <div class="popup-cat">${evt.categories[0].title}</div>
                        ${evt.sources?.length ? `<a href="${evt.sources[0].url}" target="_blank" class="popup-link">View source ↗</a>` : ''}
                    `);
            });

            DOM.eventCount.textContent = count;
            DOM.updateTime.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            DOM.statsBar.classList.add('visible');
        } catch(e) { 
            console.error('EONET error:', e); 
        }
    }

    // Initialization Logic
    // Start fetching NASA data immediately as it's independent of the user's location
    fetchDisasters();

    // Fetch user geolocation if available
    if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(
            pos => {
                const { latitude: lat, longitude: lon } = pos.coords;
                map.setView([lat, lon], 5);
                L.marker([lat, lon], { icon: liveIcon })
                    .addTo(map)
                    .bindPopup('<span style="font-family:Syne,sans-serif;font-weight:700;color:#4ade80;">You are here</span>');
                
                fetchWeather(lat, lon);
            },
            (error) => console.warn('Geolocation blocked/failed:', error.message),
            { timeout: 10000, maximumAge: 60000 } // Cache location for 60s for faster subsequent loads
        );
    }
</script>
</body>
</html>
