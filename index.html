<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Disaster & Weather Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            /* Apple-style translucent dark mode colors */
            --glass: rgba(28, 28, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #ff453a; /* iOS Red */
            --accent2: #ff9f0a; /* iOS Orange */
            --text: #ffffff;
            --muted: #ebebf599; /* iOS Secondary Label */
            --radius: 22px;
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000000;
            font-family: var(--font-stack);
            -webkit-font-smoothing: antialiased;
        }

        #map {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── Apple-style Weather Card ── */
        .weather-card {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 0.5px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 20px 24px;
            min-width: 200px;
            color: var(--text);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: none;
        }
        .weather-card.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .weather-card .label {
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .weather-card .temp {
            font-size: 48px;
            font-weight: 300; /* Apple-style thin large numbers */
            letter-spacing: -1.5px;
            line-height: 1.1;
            color: var(--text);
            margin-bottom: 12px;
        }

        .weather-card .temp sup {
            font-size: 24px;
            font-weight: 400;
            vertical-align: super;
            letter-spacing: normal;
        }

        .weather-card .meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .weather-card .pill {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 6px 12px;
        }

        .weather-card .pill svg { flex-shrink: 0; opacity: 0.7; }

        /* ── Apple-style Stats Bar (bottom) ── */
        .stats-bar {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 0.5px solid var(--glass-border);
            border-radius: 100px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .stats-bar.visible { opacity: 1; pointer-events: auto; }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            flex-shrink: 0;
        }
        .stat-dot.amber { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

        .divider {
            width: 1px; height: 16px;
            background: var(--glass-border);
        }

        .stat-count {
            font-weight: 600;
            font-size: 14px;
        }

        /* ── Live Location Ping (Refined) ── */
        .live-marker { position: relative; width: 24px; height: 24px; }
        .live-marker .dot {
            width: 16px; height: 16px;
            background: #34c759; /* iOS Green */
            border-radius: 50%;
            border: 3px solid #fff;
            position: absolute;
            top: 4px; left: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        /* ── Disaster pulse icons ── */
        .disaster-pulse { width: 20px; height: 20px; position: relative; }
        .disaster-pulse .core {
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid #fff;
            position: absolute;
            top: 4px; left: 4px;
            box-shadow: 0 0 10px rgba(255, 69, 58, 0.6);
            animation: disaster-ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes disaster-ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }

        /* ── Apple-style Leaflet Popups ── */
        .leaflet-popup-content-wrapper {
            background: rgba(28, 28, 30, 0.85) !important;
            backdrop-filter: blur(20px) saturate(180%);
            border: 0.5px solid rgba(255,255,255,0.15) !important;
            border-radius: 16px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
            color: var(--text) !important;
            font-family: var(--font-stack) !important;
            padding: 4px !important;
        }
        .leaflet-popup-tip { background: rgba(28, 28, 30, 0.85) !important; }
        .leaflet-popup-content { margin: 12px 16px !important; }
        .popup-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--text);
            margin-bottom: 4px;
        }
        .popup-cat {
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .popup-link {
            display: inline-block;
            font-size: 13px;
            font-weight: 500;
            color: #0a84ff; /* iOS Blue */
            text-decoration: none;
        }
        .popup-link:hover { text-decoration: underline; }
        
        .leaflet-control-zoom {
            border: none !important;
            border-radius: 12px !important;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2) !important;
        }
        .leaflet-control-zoom a {
            background: rgba(28, 28, 30, 0.85) !important;
            backdrop-filter: blur(20px);
            color: var(--text) !important;
            border: none !important;
            border-bottom: 0.5px solid rgba(255,255,255,0.1) !important;
            font-size: 18px !important;
            line-height: 30px !important;
            width: 32px !important;
            height: 32px !important;
            font-family: -apple-system, sans-serif !important;
        }
        .leaflet-control-zoom a:hover { background: rgba(58, 58, 60, 0.9) !important; }

        /* ── Mobile tweaks ── */
        @media (max-width: 480px) {
            .weather-card { top: 16px; left: 16px; padding: 16px 20px; min-width: 160px; border-radius: 20px; }
            .weather-card .temp { font-size: 40px; }
            .stats-bar { bottom: 24px; padding: 10px 20px; gap: 14px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="weather-card" id="weather-card">
    <div class="label">Current Location</div>
    <div class="temp" id="temp-display">--<sup>°C</sup></div>
    <div class="meta">
        <div class="pill">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7z"/></svg>
            <span id="wind-display">-- km/h</span>
        </div>
        <div class="pill">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <span id="code-display">--</span>
        </div>
    </div>
</div>

<div class="stats-bar" id="stats-bar">
    <div class="stat-item">
        <div class="stat-dot"></div>
        <span>Today's Events</span>
        <span class="stat-count" id="event-count">--</span>
    </div>
    <div class="divider"></div>
    <div class="stat-item">
        <div class="stat-dot amber"></div>
        <span>NASA EONET</span>
    </div>
    <div class="divider"></div>
    <div class="stat-item" style="color:var(--muted); font-size:11px;" id="update-time">--</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Global data object for exporting/logging as requested
    const siteDataJSON = {
        timestamp: new Date().toISOString(),
        userLocation: null,
        currentWeather: null,
        todaysDisasters: []
    };

    const indiaBounds = L.latLngBounds([6.7535, 68.1623], [35.5087, 97.3956]);

    const map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false,
        maxBounds: indiaBounds,
        maxBoundsViscosity: 1.0,
        minZoom: 4
    }).setView([20.5937, 78.9629], 5);

    // Apple-like clean dark map
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd', maxZoom: 20
    }).addTo(map);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const DOM = {
        tempDisplay: document.getElementById('temp-display'),
        windDisplay: document.getElementById('wind-display'),
        codeDisplay: document.getElementById('code-display'),
        weatherCard: document.getElementById('weather-card'),
        eventCount: document.getElementById('event-count'),
        updateTime: document.getElementById('update-time'),
        statsBar: document.getElementById('stats-bar')
    };

    const weatherCodes = {
        0:'Clear', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
        45:'Foggy', 48:'Icy fog', 51:'Light drizzle', 61:'Light rain',
        63:'Moderate rain', 65:'Heavy rain', 71:'Light snow', 80:'Rain showers',
        95:'Thunderstorm', 99:'Hail storm'
    };

    const getWeatherLabel = (code) => weatherCodes[code] || `Code ${code}`;

    const liveIcon = L.divIcon({
        className: '',
        html: `<div class="live-marker"><div class="dot"></div></div>`,
        iconSize: [24, 24], iconAnchor: [12, 12]
    });

    const disasterIcon = L.divIcon({
        className: '',
        html: `<div class="disaster-pulse"><div class="core"></div></div>`,
        iconSize: [20, 20], iconAnchor: [10, 10]
    });

    async function fetchWeather(lat, lon) {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const { current_weather: cw } = await res.json();
            
            siteDataJSON.currentWeather = cw;

            DOM.tempDisplay.innerHTML = `${Math.round(cw.temperature)}<sup>°C</sup>`;
            DOM.windDisplay.textContent = `${cw.windspeed} km/h`;
            DOM.codeDisplay.textContent = getWeatherLabel(cw.weathercode);
            DOM.weatherCard.classList.add('visible');
        } catch(e) { 
            console.error('Weather error:', e); 
        }
    }

    async function fetchDisasters() {
        try {
            // Fetch open events. Adding days=7 just to ensure we catch recent items before filtering manually to exactly "today"
            const res = await fetch('https://eonet.gsfc.nasa.gov/api/v3/events?status=open&days=7');
            const data = await res.json();
            let count = 0;
            
            const todayString = new Date().toDateString();

            data.events.forEach(evt => {
                const geo = evt.geometry[0];
                if (geo.type !== 'Point') return;
                
                // FILTER: Only show today's disasters
                const eventDateString = new Date(geo.date).toDateString();
                if (eventDateString !== todayString) return;

                const [lon, lat] = geo.coordinates;
                
                // Within India
                if (lat >= 6.7535 && lat <= 35.5087 && lon >= 68.1623 && lon <= 97.3956) {
                    count++;
                    siteDataJSON.todaysDisasters.push({
                        title: evt.title,
                        category: evt.categories[0].title,
                        date: geo.date,
                        coordinates: { lat, lon },
                        source: evt.sources?.length ? evt.sources[0].url : null
                    });

                    L.marker([lat, lon], { icon: disasterIcon })
                        .addTo(map)
                        .bindPopup(`
                            <div class="popup-title">${evt.title}</div>
                            <div class="popup-cat">${evt.categories[0].title}</div>
                            ${evt.sources?.length ? `<a href="${evt.sources[0].url}" target="_blank" class="popup-link">Source</a>` : ''}
                        `);
                }
            });

            DOM.eventCount.textContent = count;
            DOM.updateTime.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            DOM.statsBar.classList.add('visible');
            
            console.log("Site Data JSON payload:", JSON.stringify(siteDataJSON, null, 2));

        } catch(e) { 
            console.error('EONET error:', e); 
        }
    }

    fetchDisasters();

    if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(
            pos => {
                const { latitude: lat, longitude: lon } = pos.coords;
                siteDataJSON.userLocation = { latitude: lat, longitude: lon };
                
                map.setView([lat, lon], 5);
                L.marker([lat, lon], { icon: liveIcon })
                    .addTo(map)
                    .bindPopup('<span style="font-weight:600;color:#34c759;">Current Location</span>');
                
                fetchWeather(lat, lon);
            },
            (error) => console.warn('Geolocation failed:', error.message),
            { timeout: 10000, maximumAge: 60000 } 
        );
    }
</script>
</body>
</html>
