<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Disaster & Weather Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Modern, clean base styling */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* The rounded, elegant map container */
        .map-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 70vh;
            border-radius: 28px;
            overflow: hidden; /* Ensures the map stays inside the rounded corners */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 1px 3px rgba(0,0,0,0.05);
            border: 4px solid #ffffff;
            background: #e5e7eb;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1; /* Keep map below UI elements */
        }

        /* Glassmorphism Weather Overlay */
        .weather-overlay {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 24px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            min-width: 200px;
            transition: all 0.3s ease;
        }

        .weather-overlay h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
        }

        .weather-overlay .temp {
            font-size: 36px;
            font-weight: 700;
            color: #111827;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .weather-overlay .status {
            font-size: 15px;
            color: #374151;
            margin-top: 4px;
        }

        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #4b5563;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="map-wrapper">
        <div class="loading-text" id="loading-text">Locating you and fetching data...</div>
        
        <div class="weather-overlay" id="weather-card" style="display: none;">
            <h3>Current Location</h3>
            <div class="temp" id="temp-display">--°C</div>
            <div class="status" id="wind-display">Wind: -- km/h</div>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Initialize Map (Hidden initially until location is found)
        const map = L.map('map', { zoomControl: false });
        
        // Add a clean, modern base layer (CartoDB Positron)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Move zoom control to bottom right so it doesn't clash with weather UI
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 1. Get User Location
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    document.getElementById('loading-text').style.display = 'none';
                    map.setView([lat, lon], 5); // Zoom level 5 gives a good regional view

                    // Add User Marker
                    L.marker([lat, lon]).addTo(map)
                        .bindPopup("<b>You are here</b>")
                        .openPopup();

                    // Fetch APIs based on location
                    fetchWeather(lat, lon);
                    fetchDisasters();
                },
                (error) => {
                    alert("Location access denied or unavailable. Defaulting to global view.");
                    document.getElementById('loading-text').style.display = 'none';
                    map.setView([20, 0], 2);
                    fetchDisasters();
                }
            );
        } else {
            alert("Geolocation is not supported by your browser.");
        }

        // 2. Fetch Real-time Weather (Open-Meteo)
        async function fetchWeather(lat, lon) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                
                const weatherCard = document.getElementById('weather-card');
                const tempDisplay = document.getElementById('temp-display');
                const windDisplay = document.getElementById('wind-display');

                tempDisplay.innerHTML = `${data.current_weather.temperature}°C`;
                windDisplay.innerHTML = `Wind: ${data.current_weather.windspeed} km/h`;
                
                weatherCard.style.display = 'block';
            } catch (error) {
                console.error("Error fetching weather:", error);
            }
        }

        // 3. Fetch Nearby Disasters (NASA EONET API)
        async function fetchDisasters() {
            try {
                // Fetching active events from NASA
                const response = await fetch('https://eonet.gsfc.nasa.gov/api/v3/events?status=open');
                const data = await response.json();

                // Custom icon for disasters
                const disasterIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="background-color: #ef4444; width: 16px; height: 16px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);"></div>`,
                    iconSize: [22, 22],
                    iconAnchor: [11, 11]
                });

                data.events.forEach(event => {
                    // EONET returns an array of geometries (points/polygons) for the event
                    const coords = event.geometry[0].coordinates; 
                    
                    // Note: GeoJSON uses [longitude, latitude], Leaflet uses [latitude, longitude]
                    if (event.geometry[0].type === 'Point') {
                        const lon = coords[0];
                        const lat = coords[1];


                        L.marker([lat, lon], { icon: disasterIcon })
                            .addTo(map)
                            .bindPopup(`
                                <div style="font-family: sans-serif;">
                                    <h4 style="margin: 0 0 5px 0; color: #b91c1c;">${event.title}</h4>
                                    <p style="margin: 0; font-size: 12px; color: #4b5563;">Category: ${event.categories[0].title}</p>
                                    <p style="margin: 5px 0 0 0; font-size: 11px;"><a href="${event.sources[0].url}" target="_blank" style="color: #2563eb; text-decoration: none;">View Source</a></p>
                                </div>
                            `);
                    }
                });
            } catch (error) {
                console.error("Error fetching NASA EONET data:", error);
            }
        }
    </script>
</body>
</html>
